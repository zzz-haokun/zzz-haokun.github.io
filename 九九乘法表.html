<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九九乘法表</title>
</head>
<body>
    <script>
        var star = '';
        for (var i = 1;i <= 9;i++){
            for (var j = 1;j <= i;j++){
                star += j + 'x' + i + '=' + i * j + '\t';
            }
            star += '\n';
        }
        const pre = document.createElement('pre');
        pre.textContent = star;
        document.body.appendChild(pre);
    </script>
    
</body>
</html>
